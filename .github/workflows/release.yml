name: release

on:
  push:
    tags:
      - 'v[0-9]*'

jobs:
  test:
    uses: ./.github/workflows/test.yml

  release:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build frontend
        run: cd app && npm ci && npm run build

      - name: Package
        run: |
          mkdir -p pkg/savvy/app
          cp -r app/dist  pkg/savvy/app/dist
          cp -r backend   pkg/savvy/backend
          cp pyproject.toml uv.lock README.md pkg/savvy/
          tar -czf savvy-${{ github.ref_name }}.tar.gz -C pkg savvy

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ github.ref_name }} \
            --title "Savvy ${{ github.ref_name }}" \
            --generate-notes \
            savvy-${{ github.ref_name }}.tar.gz
